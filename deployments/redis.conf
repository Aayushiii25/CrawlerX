# CrawlerX Redis Configuration
# Optimized for crawling workload: persistence + bounded memory

# Persistence: Append Only File for crash recovery
appendonly yes
appendfsync everysec

# Memory limit — adjust based on expected URL volume
maxmemory 512mb
maxmemory-policy allkeys-lru

# Performance tuning
tcp-keepalive 60
timeout 0
hz 10

# Snapshotting (backup, in addition to AOF)
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice

# Security (set a password in production)
# requirepass your-redis-password

# Network
bind 0.0.0.0
protected-mode no
